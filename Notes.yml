KQL is a read-only language optimized for interactive queries. It’s designed for handling structured, semi-structured, and unstructured data, making it an excellent choice for log and telemetry analysis.

Key Features :
  High-performance querying
  Rich data exploration capabilities
  Seamless integration with Azure services

Example Code :
  Syslog
  | where SourceSystem contains "Linux" # where is used to filter the logs
  | project Computer,EventTime,HostIP,HostName # Used to select columns
  | summarize total = count() by HostIP, HostName # Summarize is used to aggrigate data
  | order by HostIP desc # order by is used to sort the data

Joining Tables :
Joining allows you to combine data from multiple tables based on a common key. KQL supports several join types.

Join Types:
  inner: Returns rows that match in both tables.
  leftouter: Returns all rows from the left table and matching rows from the right table.
  rightouter: Returns all rows from the right table and matching rows from the left table.
  fullouter: Returns all rows from both tables, with null for non-matching rows.
  anti: Returns rows from the left table that have no match in the right table.
  semi: Returns rows from the left table that have a match in the right table.

  Intersection: inner, innerunique
  Left preservation: leftouter
  Right preservation: rightouter
  Both sides: fullouter
  Membership: leftsemi
  Exclusion: leftanti
  Small-dimension lookup: lookup

A very Basic KQL logic:
  SigninLogs
  | where TimeGenerated >= ago(5m)
  | where ResultSignature =~ "FAILURE" and ResultDescription startswith "Error"
  | summarize failed_logins = count() by UserPrincipalName
  | where failed_logins >= 2

Basic Concepts:
  where # is used to filter
  == or =~ # is used to match data when using where filter case sensive and insesitive respectively
  in, contains, has, startswith, endswith, isnotnull, isnotempty, isnull  # all are used with where with a ~ if you want case insensitivity
  Simple aggregation functions: count(), sum(), avg(), min(), max()
  Advanced aggregation functions: arg_min(), arg_max(), percentiles(), makelist(), countif()


project: Select specific columns (and order) and drop all others; can compute/rename.
project-keep: Keep only the listed columns (similar effect to project without expressions).
project-away: Drop the listed columns.
project-rename: Rename columns.
project-reorder: Keep all columns; just change their order.

parse_kv: best for structured key=value blobs; you want multiple fields as real columns with the right types.
extract() / regex: best for one field or when the format near that field is messy.
parse_json() / todynamic(): when the payload is JSON.
parse operator: when the format is positional or templated, not generic key=value.

